services:
  - type: web
    name: genius-groups-static
    runtime: static
    buildCommand: npm ci && npm run build:render
    staticPublishPath: ./dist/render-static
    previews:
      generation: automatic
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /hero-frames/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /hero-academy-cover.*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
